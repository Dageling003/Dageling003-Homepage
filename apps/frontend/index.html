    <!-- 字体：直接以 stylesheet 加载。之前使用 preload+onload 的技巧会
         触发 CSP inline-event-handler 违规，改回标准写法。 -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" /></noscript>
    
    <style>
      :root {
        --background: #d0e8ff;
        --theme-color: #ffb3b3;
      }
      html {
        background-color: var(--background);
      }
      #app {
        opacity: 0;
      }
      #app.loaded {
        opacity: 1;
        transition: opacity 0.3s ease-out;
      }
    </style>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "鹊楠",
      "description": "前端开发者，热爱技术与摄影",
      "occupation": "前端工程师",
      "sameAs": [
        "https://github.com",
        "https://bilibili.com"
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>

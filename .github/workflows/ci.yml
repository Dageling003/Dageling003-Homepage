name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm -r run lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm -r run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - name: Unit tests
        working-directory: apps/backend
        env:
          DB_TYPE: sqlite
          JWT_SECRET: test-jwt-secret-for-ci-minimum-20
          NODE_ENV: test
        run: pnpm test --passWithNoTests
      - name: E2E tests
        working-directory: apps/backend
        env:
          DB_TYPE: sqlite
          JWT_SECRET: test-jwt-secret-for-ci-minimum-20
          NODE_ENV: test
        run: pnpm test:e2e

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm audit --audit-level=high --registry https://registry.npmjs.org

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.app
          load: true
          tags: homepage-app:latest
          cache-from: type=gha,scope=homepage-app
          cache-to: type=gha,scope=homepage-app,mode=max

      - name: Build caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.caddy
          load: true
          tags: homepage-caddy:latest
          build-args: |
            APP_IMAGE=homepage-app:latest
          cache-from: type=gha,scope=homepage-caddy
          cache-to: type=gha,scope=homepage-caddy,mode=max

      - name: Verify images
        run: |
          docker image inspect homepage-app:latest   --format 'app  : {{.Size}} bytes'
          docker image inspect homepage-caddy:latest --format 'caddy: {{.Size}} bytes'

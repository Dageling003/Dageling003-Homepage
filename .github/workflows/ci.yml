name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11.5.2'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests
        working-directory: apps/backend
        env:
          DB_TYPE: sqlite
          JWT_SECRET: test-jwt-secret-for-ci-minimum-20
          NODE_ENV: test
        run: pnpm test
      - name: E2E tests
        working-directory: apps/backend
        env:
          DB_TYPE: sqlite
          JWT_SECRET: test-jwt-secret-for-ci-minimum-20
          NODE_ENV: test
        run: pnpm test:e2e

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high --registry https://registry.npmjs.org
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v6

      - name: Build app image
        run: docker build -t homepage-app:latest -f docker/Dockerfile.app .

      - name: Build caddy image
        run: |
          docker build -t homepage-caddy:latest \
            --build-arg APP_IMAGE=homepage-app:latest \
            -f docker/Dockerfile.caddy .

      - name: Verify images
        run: |
          docker image inspect homepage-app:latest   --format 'app  : {{.Size}} bytes'
          docker image inspect homepage-caddy:latest --format 'caddy: {{.Size}} bytes'

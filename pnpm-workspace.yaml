packages:
  - 'apps/*'

overrides:
  tar-fs: '>=2.1.4'
  ini: '>=1.3.6'
  tmp: '>=0.2.6'
  glob: '>=11.1.0'
  esbuild: '>=0.28.1'
  form-data: '>=4.0.6'
  multer: '>=2.2.0'
  brace-expansion: '>=5.0.7'
  body-parser: '>=2.3.0'
  js-yaml: '>=4.3.0'

# Only allow build scripts for packages that need native compilation
allowBuilds:
  '@nestjs/core': true
  esbuild: true
  unrs-resolver: true
  vue-demi: true
  'core-js': true
  sharp: true
  '@scarf/scarf': true
  better-sqlite3: true

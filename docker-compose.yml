services:
  mariadb:
    image: ${MARIADB_IMAGE:-mariadb:11.4}
    container_name: homepage-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MARIADB_DATABASE: ${DB_DATABASE:-homepage}
      MARIADB_USER: ${DB_USERNAME:?DB_USERNAME is required}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-node:22-slim}
        RUNTIME_IMAGE: ${RUNTIME_IMAGE:-gcr.io/distroless/nodejs22-debian12}
    image: homepage-app:latest
    container_name: homepage-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DATABASE: ${DB_DATABASE:-homepage}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      SETUP_TOKEN: ${SETUP_TOKEN:-}
      CORS_ORIGIN: ${DOMAIN:-localhost}
      PORT: 8000
      # 找回密码 / 邮件
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_REJECT_UNAUTHORIZED: ${SMTP_REJECT_UNAUTHORIZED:-true}
      PUBLIC_ADMIN_URL: ${PUBLIC_ADMIN_URL:-}
    # Ports are NOT exposed to host — all traffic goes through Caddy (80/443)
    volumes:
      - app_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:8000/health',r=>{r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode===200?0:1))})"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    networks:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  caddy:
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
      args:
        BUILDER_IMAGE: ${BUILDER_IMAGE:-node:22-slim}
    image: homepage-caddy:latest
    container_name: homepage-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_CA: ${ACME_CA:-https://acme.zerossl.com/v2/DV90}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  mariadb_data:
  app_uploads:
  caddy_data:

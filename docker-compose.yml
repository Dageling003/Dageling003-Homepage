services:
  mariadb:
    image: mariadb:11.4
    container_name: homepage-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_DATABASE:-homepage}
      MARIADB_USER: ${DB_USERNAME:-homepage}
      MARIADB_PASSWORD: ${DB_PASSWORD:-homepage_pass}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: dageling003_homepage:latest
    container_name: homepage-app
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_started   # ✅ 关键修改
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USERNAME: ${DB_USERNAME:-homepage}
      DB_PASSWORD: ${DB_PASSWORD:-homepage_pass}
      DB_DATABASE: ${DB_DATABASE:-homepage}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      CORS_ORIGIN: ${DOMAIN:-localhost}
    # Ports are NOT exposed to host — all traffic goes through Caddy (80/443)
    volumes:
      - app_uploads:/app/backend/public/uploads

  caddy:
    image: caddy:2
    container_name: homepage-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.docker:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_CA: ${ACME_CA:-https://acme.zerossl.com/v2/DV90}
      ACME_EMAIL: ${ACME_EMAIL:-}
    depends_on:
      - app

volumes:
  mariadb_data:
  app_uploads:
  caddy_data:
